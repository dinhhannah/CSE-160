<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Asgn 1</title>
    <link rel="stylesheet" type="text/css" href="asgn1.css" />
  </head>

  <body onload="main()">
    <h1>Assignment 1: Painting</h1>

    
    <canvas id="webgl" width="400" height="400">
        Please use a browser that supports "canvas"
    </canvas>

    <p id="numdot">XXX</p>
    <p id="coords">Coords: X: 0.00, Y: 0.00</p>

    <p>Also I made the circle tool less laggy with buffers</p>

    <br>

    <div>
        <button type="button" id="green">Green</button>
        <button type="button" id="red">Red</button>
        
        <br><br>

        <button type="button" id="clearButton">Clear</button>

        <br><br>

        <button type="button" id="pointButton">Point</button>
        <button type="button" id="triButton">Triangle</button>
        <button type="button" id="circleButton">Circle</button>
        <br><br>
        <img id="picture" src="crystal-drawing.png" style="width: 300px; height: 300px;" />
        <br>
        <button id="generate-pic">Generate Picture</button>

    </div>
      
    <div>
        <p>
            Red <input type="range" min="0" max="255" value="255" class="slider" id="redSlide">

            Green <input type="range" min="0" max="255" value="255" class="slider" id="greenSlide">

            Blue <input type="range" min="0" max="255" value="255" class="slider" id="blueSlide">
        </p>


        <p>
            Size <input type="range" min="5" max="40" value="5" class="slider" id="sizeSlide">
            Segments (Circle) <input type="range" min="10" max="40" value="10" class="slider" id="segmentSlide">
        </p>
    </div>

    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>

    <script src="Point.js"></script>
    <script src="Triangle.js"></script>
    <script src="Circle.js"></script>
    <script src="asgn1.js"></script>
  </body>
